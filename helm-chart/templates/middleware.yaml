{{- if .Values.ingress.enabled }}
# Traefik middleware: permanent redirect HTTP -> HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  labels:
    {{- include "photopia.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
{{- end }}
