{{- if .Values.ingress.enabled }}
# HTTP ingress — redirects all traffic to HTTPS via Traefik middleware
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "photopia.fullname" . }}-http
  labels:
    {{- include "photopia.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-https-redirect@kubernetescrd"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "photopia.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
---
# HTTPS ingress — terminates TLS, serves the app
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "photopia.fullname" . }}-https
  labels:
    {{- include "photopia.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  tls:
    - secretName: {{ .Values.ingress.tls.secretName }}
      hosts:
        - {{ .Values.ingress.host | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "photopia.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
