# Default values for photopia.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: grekodocker/photopia-bundle
  pullPolicy: Always
  # tag is overridden at deploy time via --set image.tag=<git-hash> (see Taskfile.yml).
  tag: "latest"

# Pull secret for Docker Hub (created via `task docker:k8s-secret`).
imagePullSecrets:
  - name: dockerhub-creds

service:
  type: ClusterIP
  port: 8000

# Kubernetes Secret variables.
# For production override with: helm ... --set secret.apikey=<value>
secret:
  apikey: "change-this-api-key-secret-in-production"

# Persistent Storage settings for the galleries directory (mounted at /storage).
persistence:
  enabled: true
  size: 5Gi
  # StorageClass name. Leave empty to use the cluster default (dynamic provisioner).
  storageClassName: ""
  accessMode: ReadWriteOnce
  # hostPath is only for single-node/dev clusters; prefer a dynamic StorageClass in the cluster.
  hostPath:
    enabled: false
    path: "/var/data/photopia-storage"

# Ingress — Traefik + cert-manager (matches the rest of the cluster).
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: "photo.alexgr.space"
  tls:
    secretName: photopia-tls

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}
